<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wagoat || PAIR CODE</title>
  <link rel="shortcut icon" type="x-icon" href="https://files.catbox.moe/oifwcm.jpg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');

    :root {
      --primary: #ff00b3;
      --secondary: #ff6b00;
      --dark: #0a0a14;
      --darker: #050508;
      --text: #e0e0ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      background: var(--darker);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      color: var(--text);
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(255,0,179,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 60%, rgba(255,107,0,0.06) 0%, transparent 55%);
      z-index: 0;
    }

    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,0,179,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,179,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      margin-bottom: 0.3rem;
      filter: drop-shadow(0 0 15px rgba(255,0,179,0.4));
    }

    .header p {
      font-size: 0.9rem;
      opacity: 0.5;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      margin: 0 1.5rem;
      background: rgba(10,10,20,0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,0,179,0.15);
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 0 60px rgba(255,0,179,0.15);
    }

    /* Top gradient line */
    .card-line {
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    /* Banner */
    .card-banner {
      width: 100%;
      height: 140px;
      position: relative;
      overflow: hidden;
    }

    .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.5);
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 20%, rgba(10,10,20,0.95) 100%);
    }

    /* Avatar on banner */
    .card-avatar {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(255,0,179,0.5);
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,0,179,0.4);
    }

    .card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Body */
    .card-body {
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    .bot-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 2px;
      margin-bottom: 0.2rem;
      text-shadow: 0 0 15px rgba(255,0,179,0.4);
    }

    .bot-credit {
      font-size: 0.75rem;
      opacity: 0.4;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .instruction {
      font-size: 0.95rem;
      opacity: 0.65;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .instruction span {
      color: #25D366;
      font-weight: 600;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .input-row input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,0,179,0.25);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .input-row input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(255,0,179,0.25);
      background: rgba(255,0,179,0.05);
    }

    .input-row input::placeholder {
      color: rgba(224,224,255,0.35);
    }

    .input-row button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 1px;
      padding: 0 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      min-width: 90px;
    }

    .input-row button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.4s ease;
    }

    .input-row button:hover { box-shadow: 0 0 20px rgba(255,0,179,0.5); }
    .input-row button:hover::after { left: 100%; }

    /* Result area */
    #result {
      min-height: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #copy-box {
      background: rgba(255,0,179,0.08);
      border: 1px solid rgba(255,0,179,0.25);
      border-radius: 10px;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--primary);
      transition: all 0.3s ease;
      display: none;
    }

    #copy-box:hover {
      background: rgba(255,0,179,0.15);
      box-shadow: 0 0 20px rgba(255,0,179,0.3);
      transform: scale(1.02);
    }

    #copy-hint {
      font-size: 0.78rem;
      opacity: 0.4;
      margin-top: 0.5rem;
      display: none;
    }

    #waiting {
      font-size: 0.95rem;
      opacity: 0.6;
      display: none;
      gap: 8px;
      align-items: center;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,0,179,0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      color: #ff4444;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
    }

    /* Corner accents */
    .corner { position: absolute; width: 14px; height: 14px; border-color: var(--primary); opacity: 0.3; transition: opacity 0.3s; }
    .card:hover .corner { opacity: 0.8; }
    .corner-tl { top: 10px; left: 10px; border-top: 2px solid; border-left: 2px solid; }
    .corner-tr { top: 10px; right: 10px; border-top: 2px solid; border-right: 2px solid; }
    .corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid; border-left: 2px solid; }
    .corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid; border-right: 2px solid; }

    /* Footer */
    .footer {
      position: relative;
      z-index: 2;
      text-align: center;
      font-size: 0.78rem;
      opacity: 0.3;
      margin-top: 2rem;
      padding-bottom: 2rem;
      letter-spacing: 1px;
    }

    @media (max-width: 480px) {
      .card { margin: 0 1rem; }
      .input-row { flex-direction: column; }
      .input-row button { padding: 0.9rem; }
      .header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="header">
    <h1>Wagoat</h1>
    <p>WhatsApp Bot Pairing</p>
  </div>

  <div class="card">
    <div class="card-line"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="card-banner">
      <img src="https://files.catbox.moe/oifwcm.jpg" alt="Wagoat">
      <div class="banner-overlay"></div>
      <div class="card-avatar">
        <img src="https://files.catbox.moe/oifwcm.jpg" alt="WG">
      </div>
    </div>

    <div class="card-body">
      <div class="bot-name">WAGOAT</div>
      <div class="bot-credit">Romeo Calyx X Frank Kaumba Dev</div>

      <div class="instruction">
        Enter your <span>WhatsApp</span> number with country code to get your pairing code
      </div>

      <div class="input-row">
        <input type="number" id="number" placeholder="+265993xxxxxxx">
        <button id="submit">CONNECT</button>
      </div>

      <div id="waiting">
        <div class="spinner"></div>
        Generating code...
      </div>
      <div id="error-msg"></div>

      <div id="result">
        <div id="copy-box" onclick="copyCode()"></div>
        <div id="copy-hint">tap to copy</div>
      </div>
    </div>
  </div>

  <div class="footer">
    © Romeo Calyx X Frank Kaumba Dev | Wagoat v1.0.0
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const numInput = document.getElementById('number');
    const submitBtn = document.getElementById('submit');
    const waiting = document.getElementById('waiting');
    const errorMsg = document.getElementById('error-msg');
    const copyBox = document.getElementById('copy-box');
    const copyHint = document.getElementById('copy-hint');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      waiting.style.display = 'none';
    }

    function hideAll() {
      errorMsg.style.display = 'none';
      copyBox.style.display = 'none';
      copyHint.style.display = 'none';
      waiting.style.display = 'none';
    }

    async function copyCode() {
      const code = copyBox.dataset.code;
      if (!code) return;
      await navigator.clipboard.writeText(code);
      const orig = copyBox.textContent;
      copyBox.textContent = '✓ COPIED!';
      setTimeout(() => { copyBox.textContent = orig; }, 1200);
    }

    submitBtn.addEventListener('click', async () => {
      hideAll();
      const raw = numInput.value.replace(/[^0-9]/g, '');

      if (!raw) return showError('Please enter your WhatsApp number with country code.');
      if (raw.length < 10) return showError('Number too short. Include your country code.');

      waiting.style.display = 'flex';
      submitBtn.disabled = true;

      // Format display
      numInput.type = 'text';
      numInput.value = '+' + raw;
      numInput.style.color = '#ff00b3';
      numInput.style.fontWeight = '700';

      try {
        const { data } = await axios(`/code2?number=${raw}`);
        waiting.style.display = 'none';
        const code = data.code || 'Unavailable';
        copyBox.textContent = code;
        copyBox.dataset.code = code;
        copyBox.style.display = 'block';
        copyHint.style.display = 'block';
      } catch (e) {
        showError('Connection error. Please try again.');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
